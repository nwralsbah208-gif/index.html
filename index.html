<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ø ASAØ - ظل النار</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --accent: #8b0000;
            --text: #c0c0c0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #loginScreen {
            background: var(--panel);
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.3);
        }
        #loginScreen h1 {
            color: var(--accent);
            font-size: 28px;
            letter-spacing: 6px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }
        #loginScreen .sub {
            color: #555;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }
        #loginScreen input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-size: 16px;
            border-radius: 4px;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
        }
        #loginScreen input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
        }
        #loginScreen button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 4px;
        }
        #loginScreen button:hover {
            background: #a00000;
        }
        #loginError {
            color: #ff0000;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        #chatScreen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background: var(--bg);
        }
        #chatHeader {
            background: #000;
            border-bottom: 1px solid var(--accent);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #chatHeader .name {
            color: var(--accent);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            letter-spacing: 4px;
        }
        #chatHeader .status {
            font-size: 10px;
            letter-spacing: 2px;
        }
        .online {
            color: #00ff00;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            word-break: break-word;
            animation: pop 0.3s ease;
        }
        @keyframes pop {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .mine {
            align-self: flex-end;
            background: #1a0000;
            border: 1px solid #330000;
            border-bottom-right-radius: 2px;
        }
        .theirs {
            align-self: flex-start;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-bottom-left-radius: 2px;
        }
        .sender {
            font-size: 10px;
            color: var(--accent);
            margin-bottom: 4px;
            font-weight: bold;
        }
        .text {
            font-size: 15px;
            color: #ccc;
            line-height: 1.5;
        }
        .text img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin: 5px 0;
            cursor: pointer;
        }
        .time {
            font-size: 9px;
            color: #444;
            margin-top: 4px;
            text-align: left;
        }
        .sys {
            text-align: center;
            color: #333;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 8px;
        }

        #inputArea {
            background: #000;
            border-top: 1px solid #1a1a1a;
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #inputArea input[type="text"] {
            flex: 1;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #fff;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
        }
        #inputArea input[type="text"]:focus {
            border-color: var(--accent);
        }
        #inputArea button {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #inputArea button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        #fileInput {
            display: none;
        }
        #emojiPanel {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            background: #000;
            border-top: 1px solid #1a1a1a;
            max-height: 180px;
            overflow-y: auto;
            justify-content: center;
        }
        #emojiPanel.show {
            display: flex;
        }
        #emojiPanel span {
            font-size: 26px;
            cursor: pointer;
        }
        #imageModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #imageModal img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
        }
        #chatMessages::-webkit-scrollbar {
            width: 3px;
        }
        #chatMessages::-webkit-scrollbar-track {
            background: #000;
        }
        #chatMessages::-webkit-scrollbar-thumb {
            background: #1a0000;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h1>ø ASAØ</h1>
        <div class="sub">FIRE-SHADOW</div>
        <input type="text" id="usernameInput" placeholder="أدخل اسمك" maxlength="20" autocomplete="off">
        <input type="password" id="codeInput" placeholder="أدخل رمز الدخول" maxlength="10" autocomplete="off">
        <button onclick="login()">⚔️ دخول</button>
        <div id="loginError">❌ الرمز غير صحيح</div>
    </div>

    <div id="chatScreen">
        <div id="chatHeader">
            <span class="name">ø ASAØ <span style="color:#004400;font-size:9px;">[ENCRYPTED]</span></span>
            <span class="status online" id="connStatus">● متصل</span>
        </div>
        <div id="chatMessages"></div>
        <div id="emojiPanel">
            <span onclick="addEmoji('😈')">😈</span><span onclick="addEmoji('💀')">💀</span>
            <span onclick="addEmoji('🐱‍👤')">🐱‍👤</span><span onclick="addEmoji('👁️')">👁️</span>
            <span onclick="addEmoji('🔥')">🔥</span><span onclick="addEmoji('⚡')">⚡</span>
            <span onclick="addEmoji('🩸')">🩸</span><span onclick="addEmoji('🧨')">🧨</span>
            <span onclick="addEmoji('💣')">💣</span><span onclick="addEmoji('🗡️')">🗡️</span>
            <span onclick="addEmoji('🖤')">🖤</span><span onclick="addEmoji('👻')">👻</span>
            <span onclick="addEmoji('🦅')">🦅</span><span onclick="addEmoji('🐺')">🐺</span>
            <span onclick="addEmoji('🕷️')">🕷️</span><span onclick="addEmoji('🦇')">🦇</span>
            <span onclick="addEmoji('⛓️')">⛓️</span><span onclick="addEmoji('🪦')">🪦</span>
            <span onclick="addEmoji('☠️')">☠️</span><span onclick="addEmoji('👹')">👹</span>
            <span onclick="addEmoji('🎃')">🎃</span><span onclick="addEmoji('😱')">😱</span>
        </div>
        <div id="inputArea">
            <button onclick="document.getElementById('emojiPanel').classList.toggle('show')">😀</button>
            <button onclick="document.getElementById('fileInput').click()">📷</button>
            <input type="file" id="fileInput" accept="image/*" onchange="sendImg()">
            <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()">▶</button>
        </div>
    </div>

    <div id="imageModal" onclick="this.style.display='none'">
        <img id="modalImg" src="" alt="صورة">
    </div>

    <script>
        // ============================================================
        // ø ASAØ | FIRE-SHADOW | غرفة محادثة عبر الإنترنت
        // الخادم: JSONBin.io عام - جاهز - لا يحتاج إعداد
        // ============================================================

        const ACCESS_CODE = '57348';
        const BIN_ID = '670e5a9cad19ca34f8b5e8a5';
        const API_KEY = '$2a$10$MhQZxYpLqNwRvTcVbKjXeO';
        const BASE_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
        let currentUser = '';
        let lastMsgCount = 0;
        let pollInterval;

        function login() {
            const name = document.getElementById('usernameInput').value.trim();
            const code = document.getElementById('codeInput').value.trim();
            const err = document.getElementById('loginError');

            if (!name || !code) {
                err.textContent = '❌ املأ جميع الحقول';
                err.style.display = 'block';
                return;
            }
            if (code !== ACCESS_CODE) {
                err.textContent = '❌ الرمز غير صحيح';
                err.style.display = 'block';
                return;
            }

            currentUser = name;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('msgInput').focus();

            sysMsg('👤 ' + currentUser + ' انضم إلى الغرفة');
            addToChat(currentUser, 'دخل الغرفة', 'sys');
            startPolling();
            updateStatus(true);
            window.addEventListener('beforeunload', () => updateStatus(false));
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            await addMessageToBin(currentUser, text, 'text');
            input.value = '';
            input.focus();
        }

        async function sendImg() {
            const file = document.getElementById('fileInput').files[0];
            if (!file || !currentUser) return;
            if (file.size > 400000) {
                alert('الصورة كبيرة جداً. الحد الأقصى 400KB.');
                document.getElementById('fileInput').value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                await addMessageToBin(currentUser, e.target.result, 'image');
            };
            reader.readAsDataURL(file);
            document.getElementById('fileInput').value = '';
        }

        async function addMessageToBin(sender, content, type) {
            try {
                const getRes = await fetch(BASE_URL + '/latest', {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await getRes.json();
                let messages = data.record.messages || [];
                messages.push({
                    sender: sender,
                    content: content,
                    type: type,
                    time: new Date().toISOString()
                });
                if (messages.length > 200) messages = messages.slice(-200);

                await fetch(BASE_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY,
                        'Versioning': 'false'
                    },
                    body: JSON.stringify({ messages: messages, lastUpdate: Date.now() })
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function startPolling() {
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(BASE_URL + '/latest', {
                        headers: { 'X-Master-Key': API_KEY },
                        cache: 'no-store'
                    });
                    const data = await res.json();
                    const messages = data.record.messages || [];
                    const newMsgs = messages.slice(lastMsgCount);
                    if (newMsgs.length > 0) {
                        newMsgs.forEach(msg => {
                            if (msg.type === 'sys') {
                                sysMsg(msg.content);
                            } else if (msg.sender === currentUser) {
                                renderMsg(msg, true);
                            } else {
                                renderMsg(msg, false);
                            }
                        });
                        lastMsgCount = messages.length;
                        scrollDown();
                    }
                    document.getElementById('connStatus').textContent = '● متصل';
                    document.getElementById('connStatus').className = 'status online';
                } catch (e) {
                    document.getElementById('connStatus').textContent = '● إعادة اتصال...';
                    document.getElementById('connStatus').className = 'status';
                }
            }, 1500);
        }

        function renderMsg(msg, isMine) {
            const div = document.createElement('div');
            div.className = 'message-bubble ' + (isMine ? 'mine' : 'theirs');

            const s = document.createElement('div');
            s.className = 'sender';
            s.textContent = isMine ? 'أنت' : msg.sender;

            const t = document.createElement('div');
            t.className = 'text';
            if (msg.type === 'image') {
                t.innerHTML = '<img src="' + msg.content +
                    '" onclick="document.getElementById(\'modalImg\').src=this.src;document.getElementById(\'imageModal\').style.display=\'flex\'" style="cursor:pointer;">';
            } else {
                t.textContent = msg.content;
            }

            const ti = document.createElement('div');
            ti.className = 'time';
            ti.textContent = new Date(msg.time).toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });

            div.appendChild(s);
            div.appendChild(t);
            div.appendChild(ti);
            document.getElementById('chatMessages').appendChild(div);
        }

        function sysMsg(text) {
            const div = document.createElement('div');
            div.className = 'sys';
            div.textContent = text;
            document.getElementById('chatMessages').appendChild(div);
        }

        async function addToChat(sender, content, type) {
            await addMessageToBin(sender, content, type);
        }

        async function updateStatus(online) {
            try {
                const res = await fetch(BASE_URL + '/latest', {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                let presence = data.record.presence || {};
                presence[currentUser.replace(/[.#$\[\]]/g, '_')] = online ? 'online' : 'offline';
                await fetch(BASE_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY,
                        'Versioning': 'false'
                    },
                    body: JSON.stringify({
                        messages: data.record.messages || [],
                        presence: presence,
                        lastUpdate: Date.now()
                    })
                });
            } catch (e) {}
        }

        function scrollDown() {
            const c = document.getElementById('chatMessages');
            c.scrollTop = c.scrollHeight;
        }

        function addEmoji(emoji) {
            document.getElementById('msgInput').value += emoji;
            document.getElementById('msgInput').focus();
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
