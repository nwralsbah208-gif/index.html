<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ø ASAØ - ظل الإنترنت</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --border: #1a1a1a;
            --text: #c0c0c0;
            --accent: #8b0000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* شاشة الدخول */
        #loginScreen {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.3);
        }
        #loginScreen h1 {
            color: var(--accent);
            font-size: 28px;
            letter-spacing: 6px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }
        #loginScreen .subtitle {
            color: #555;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }
        #loginScreen input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-size: 16px;
            border-radius: 4px;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s;
        }
        #loginScreen input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
        }
        #loginScreen button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }
        #loginScreen button:hover {
            background: #a00000;
            box-shadow: 0 0 25px rgba(139, 0, 0, 0.5);
        }
        #loginError {
            color: #ff0000;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        /* شاشة المحادثة */
        #chatScreen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background: var(--bg);
        }
        #chatHeader {
            background: #000;
            border-bottom: 1px solid var(--accent);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #chatHeader .room-name {
            color: var(--accent);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            letter-spacing: 4px;
        }
        #chatHeader .status {
            font-size: 10px;
            letter-spacing: 2px;
        }
        .online {
            color: #00ff00;
        }
        .offline {
            color: #ff0000;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            word-break: break-word;
            animation: msgIn 0.3s ease;
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-mine {
            align-self: flex-end;
            background: #1a0000;
            border: 1px solid #330000;
            border-bottom-right-radius: 2px;
        }
        .message-theirs {
            align-self: flex-start;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-bottom-left-radius: 2px;
        }
        .message-sender {
            font-size: 10px;
            color: var(--accent);
            margin-bottom: 4px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .message-text {
            font-size: 15px;
            color: #ccc;
            line-height: 1.5;
        }
        .message-text img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin: 5px 0;
            cursor: pointer;
        }
        .message-time {
            font-size: 9px;
            color: #444;
            margin-top: 4px;
            text-align: left;
        }
        .system-msg {
            text-align: center;
            color: #333;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 8px;
        }

        #chatInputArea {
            background: #000;
            border-top: 1px solid #1a1a1a;
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #chatInputArea input[type="text"] {
            flex: 1;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #fff;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
        }
        #chatInputArea input[type="text"]:focus {
            border-color: var(--accent);
        }
        #chatInputArea button {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #chatInputArea button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        #fileInput {
            display: none;
        }
        #emojiPanel {
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background: #000;
            border-top: 1px solid #1a1a1a;
            max-height: 200px;
            overflow-y: auto;
            justify-content: center;
        }
        #emojiPanel.active {
            display: flex;
        }
        #emojiPanel span {
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #emojiPanel span:hover {
            transform: scale(1.4);
        }
        #imageModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #imageModal img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
        }
        #chatMessages::-webkit-scrollbar {
            width: 4px;
        }
        #chatMessages::-webkit-scrollbar-track {
            background: #000;
        }
        #chatMessages::-webkit-scrollbar-thumb {
            background: #1a0000;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="loginScreen">
        <h1>ø ASAØ</h1>
        <div class="subtitle">INTERNET-SHADOW</div>
        <input type="text" id="usernameInput" placeholder="أدخل اسمك" maxlength="20" autocomplete="off">
        <input type="password" id="codeInput" placeholder="أدخل رمز الدخول" maxlength="10" autocomplete="off">
        <button onclick="attemptLogin()">⚔️ دخول</button>
        <div id="loginError">❌ الرمز غير صحيح</div>
    </div>

    <!-- شاشة المحادثة -->
    <div id="chatScreen">
        <div id="chatHeader">
            <span class="room-name">ø ASAØ <span style="color:#004400;font-size:10px;">[ENCRYPTED]</span></span>
            <span class="status online" id="connectionStatus">● متصل</span>
        </div>
        <div id="chatMessages"></div>
        <div id="emojiPanel">
            <span onclick="insertEmoji('😈')">😈</span><span onclick="insertEmoji('💀')">💀</span>
            <span onclick="insertEmoji('🐱‍👤')">🐱‍👤</span><span onclick="insertEmoji('👁️')">👁️</span>
            <span onclick="insertEmoji('🔥')">🔥</span><span onclick="insertEmoji('⚡')">⚡</span>
            <span onclick="insertEmoji('🩸')">🩸</span><span onclick="insertEmoji('🧨')">🧨</span>
            <span onclick="insertEmoji('💣')">💣</span><span onclick="insertEmoji('🗡️')">🗡️</span>
            <span onclick="insertEmoji('🖤')">🖤</span><span onclick="insertEmoji('👻')">👻</span>
            <span onclick="insertEmoji('🎭')">🎭</span><span onclick="insertEmoji('🦅')">🦅</span>
            <span onclick="insertEmoji('🐺')">🐺</span><span onclick="insertEmoji('🕷️')">🕷️</span>
            <span onclick="insertEmoji('🦇')">🦇</span><span onclick="insertEmoji('⛓️')">⛓️</span>
            <span onclick="insertEmoji('🪦')">🪦</span><span onclick="insertEmoji('☠️')">☠️</span>
            <span onclick="insertEmoji('👹')">👹</span><span onclick="insertEmoji('🤖')">🤖</span>
            <span onclick="insertEmoji('🎃')">🎃</span><span onclick="insertEmoji('😱')">😱</span>
        </div>
        <div id="chatInputArea">
            <button onclick="toggleEmoji()" title="إيموجيات">😀</button>
            <button onclick="document.getElementById('fileInput').click()" title="صورة">📷</button>
            <input type="file" id="fileInput" accept="image/*" onchange="sendImage()">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()" title="إرسال">▶</button>
        </div>
    </div>

    <div id="imageModal" onclick="this.style.display='none'">
        <img id="modalImage" src="" alt="صورة">
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, serverTimestamp, onValue, off, remove } from
        "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDktNhUGoYbKqJPK4JJ8RCeF9KZ5HGhQvE",
            authDomain: "shadow-vault-chat.firebaseapp.com",
            databaseURL: "https://shadow-vault-chat-default-rtdb.firebaseio.com",
            projectId: "shadow-vault-chat",
            storageBucket: "shadow-vault-chat.appspot.com",
            messagingSenderId: "1085738429214",
            appId: "1:1085738429214:web:abc123def456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ACCESS_CODE = '57348';
        const ROOM_ID = 'shadow_vault_room_omega';
        let currentUser = '';
        let isLoggedIn = false;

        window.attemptLogin = function() {
            const username = document.getElementById('usernameInput').value.trim();
            const code = document.getElementById('codeInput').value.trim();
            const errorEl = document.getElementById('loginError');

            if (!username || !code) {
                errorEl.textContent = '❌ املأ جميع الحقول';
                errorEl.style.display = 'block';
                return;
            }
            if (code !== ACCESS_CODE) {
                errorEl.textContent = '❌ الرمز غير صحيح';
                errorEl.style.display = 'block';
                return;
            }

            currentUser = username;
            isLoggedIn = true;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('messageInput').focus();

            addSystemMessage('👤 ' + currentUser + ' انضم إلى الغرفة');
            listenForMessages();
            monitorConnection();
            updatePresence(true);
        };

        window.sendMessage = function() {
            if (!isLoggedIn) return;
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const msgRef = push(ref(db, ROOM_ID));
            set(msgRef, {
                sender: currentUser,
                text: text,
                type: 'text',
                timestamp: serverTimestamp(),
                encrypted: btoa(encodeURIComponent(text))
            });

            input.value = '';
            input.focus();
        };

        window.sendImage = function() {
            if (!isLoggedIn) return;
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;
            if (file.size > 500000) {
                alert('الصورة كبيرة جداً. الحد الأقصى 500KB.');
                fileInput.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const msgRef = push(ref(db, ROOM_ID));
                set(msgRef, {
                    sender: currentUser,
                    text: e.target.result,
                    type: 'image',
                    timestamp: serverTimestamp()
                });
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        };

        function listenForMessages() {
            const roomRef = ref(db, ROOM_ID);
            onChildAdded(roomRef, function(snapshot) {
                const msg = snapshot.val();
                if (msg.sender === currentUser) {
                    renderMessage(msg, true);
                } else {
                    renderMessage(msg, false);
                }
                scrollToBottom();
            });
        }

        function renderMessage(msg, isMine) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-bubble ' + (isMine ? 'message-mine' : 'message-theirs');

            const senderSpan = document.createElement('div');
            senderSpan.className = 'message-sender';
            senderSpan.textContent = isMine ? 'أنت' : msg.sender;

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';

            if (msg.type === 'image') {
                textDiv.innerHTML = '<img src="' + msg.text +
                    '" onclick="document.getElementById(\'modalImage\').src=this.src;document.getElementById(\'imageModal\').style.display=\'flex\'" style="cursor:pointer;max-width:200px;max-height:200px;border-radius:8px;">';
            } else {
                try {
                    textDiv.textContent = decodeURIComponent(atob(msg.encrypted));
                } catch (e) {
                    textDiv.textContent = msg.text;
                }
            }

            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.textContent = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });

            msgDiv.appendChild(senderSpan);
            msgDiv.appendChild(textDiv);
            msgDiv.appendChild(timeSpan);
            document.getElementById('chatMessages').appendChild(msgDiv);
        }

        function addSystemMessage(text) {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-msg';
            sysDiv.textContent = text;
            document.getElementById('chatMessages').appendChild(sysDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        function monitorConnection() {
            const connectedRef = ref(db, '.info/connected');
            onValue(connectedRef, function(snap) {
                const status = document.getElementById('connectionStatus');
                if (snap.val() === true) {
                    status.textContent = '● متصل';
                    status.className = 'status online';
                } else {
                    status.textContent = '● غير متصل';
                    status.className = 'status offline';
                }
            });
        }

        function updatePresence(online) {
            const presenceRef = ref(db, ROOM_ID + '_presence/' + currentUser.replace(/[.#$\[\]]/g, '_'));
            if (online) {
                set(presenceRef, { online: true, timestamp: serverTimestamp() });
                window.addEventListener('beforeunload', function() {
                    set(presenceRef, { online: false });
                });
            }
        }

        window.toggleEmoji = function() {
            document.getElementById('emojiPanel').classList.toggle('active');
        };

        window.insertEmoji = function(emoji) {
            document.getElementById('messageInput').value += emoji;
            document.getElementById('messageInput').focus();
        };

        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key ===
                    'U')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
