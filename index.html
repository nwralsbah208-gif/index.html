<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌑 DARK KNIGHT FINAL - ø ASAØ</title>
    <style>
        :root{--bg:#000a14;--panel:#001020;--accent:#1a73e8;--accent2:#ff6d00;--red:#ff1744;--green:#00e676;--gold:#ffaa00;--text:#c0c0c0;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);font-family:'Segoe UI','Arial',sans-serif;color:var(--text);min-height:100vh;}
        
        #loginScreen{display:flex;justify-content:center;align-items:center;min-height:100vh;background:var(--bg);padding:20px;}
        .login-box{background:var(--panel);border:1px solid #1a3050;border-radius:16px;padding:40px;text-align:center;width:400px;box-shadow:0 0 60px rgba(26,115,232,0.2);}
        .login-box .logo{font-size:60px;margin-bottom:10px;}
        .login-box h1{color:#fff;font-size:24px;letter-spacing:4px;margin-bottom:5px;}
        .login-box .sub{color:#666;font-size:10px;letter-spacing:2px;margin-bottom:25px;}
        .login-box input{width:100%;padding:12px;margin:6px 0;background:#000;border:1px solid #1a3050;color:#fff;font-size:14px;border-radius:6px;text-align:center;outline:none;font-family:inherit;}
        .login-box input:focus{border-color:var(--accent);box-shadow:0 0 15px rgba(26,115,232,0.3);}
        .login-box button{width:100%;padding:12px;margin-top:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:bold;cursor:pointer;letter-spacing:2px;}
        .login-box button:hover{background:#1a5fd4;}
        .login-box button.orange{background:var(--accent2);}
        .login-box .link{color:var(--accent);font-size:10px;cursor:pointer;margin-top:10px;display:inline-block;}
        .error{color:#f00;font-size:10px;margin-top:5px;display:none;}
        .success{color:#0f0;font-size:10px;margin-top:5px;display:none;}
        
        #mainScreen{display:none;}
        .header{background:#000;border-bottom:1px solid #1a3050;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
        .header .brand{color:var(--accent);font-size:18px;font-weight:bold;letter-spacing:3px;}
        .header .user{color:#888;font-size:11px;}
        .header .btns{display:flex;gap:6px;flex-wrap:wrap;}
        .header button{background:var(--accent2);color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:10px;letter-spacing:1px;}
        .header button.red{background:var(--red);}
        
        .layout{max-width:750px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:15px;}
        
        .post-box{background:var(--panel);border:1px solid #1a3050;border-radius:12px;padding:20px;}
        .post-box textarea{width:100%;background:#000;border:1px solid #1a3050;color:#fff;padding:12px;border-radius:8px;font-size:14px;outline:none;font-family:inherit;resize:none;min-height:80px;}
        .post-box textarea:focus{border-color:var(--accent);}
        .post-box input[type="file"]{margin:8px 0;color:#888;font-size:10px;}
        .post-box button{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:bold;margin-top:8px;letter-spacing:1px;}
        .post-box .img-preview{max-width:200px;max-height:200px;border-radius:8px;margin:8px 0;display:none;}
        
        .post-card{background:var(--panel);border:1px solid #1a3050;border-radius:12px;padding:15px 20px;animation:fadeIn 0.3s;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .post-card .post-author{color:var(--accent);font-size:11px;font-weight:bold;letter-spacing:1px;}
        .post-card .post-time{color:#555;font-size:9px;}
        .post-card .post-content{color:#ddd;font-size:14px;margin:10px 0;line-height:1.6;}
        .post-card .post-content img{max-width:300px;max-height:300px;border-radius:8px;margin:8px 0;cursor:pointer;}
        .post-card .post-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
        .post-card .post-actions button{background:transparent;border:1px solid #333;color:#888;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:9px;}
        .post-card .post-actions button:hover{background:#1a3050;color:#fff;}
        .post-card .post-actions button.report-btn{border-color:#600;color:#f66;}
        
        .comment-section{margin-top:10px;border-top:1px solid #1a3050;padding-top:10px;}
        .comment-section input{width:100%;background:#000;border:1px solid #1a3050;color:#fff;padding:8px;border-radius:20px;font-size:11px;outline:none;margin-top:5px;}
        .comment-item{padding:4px 0;font-size:10px;display:flex;justify-content:space-between;align-items:center;}
        .comment-item .comment-author{color:var(--accent);font-size:9px;}
        .comment-item .comment-text{color:#aaa;}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:200;justify-content:center;align-items:center;padding:20px;}
        .modal.active{display:flex;}
        .modal-content{background:var(--panel);border:1px solid #1a3050;border-radius:12px;padding:25px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;text-align:right;}
        .modal-content h3{color:#fff;margin-bottom:15px;text-align:center;}
        .modal-content button{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;margin:4px;font-size:11px;}
        .modal-content button.red{background:var(--red);}
        .modal-content .report-option{display:block;width:100%;padding:10px;margin:4px 0;background:#000;border:1px solid #333;color:#fff;border-radius:6px;cursor:pointer;text-align:right;font-size:11px;}
        .modal-content .report-option:hover{background:#1a0000;border-color:#f00;}
        
        .visitor-row{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #1a3050;font-size:10px;flex-wrap:wrap;gap:4px;}
        .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:8px;letter-spacing:1px;}
        .badge.owner{background:var(--gold);color:#000;}
        .badge.banned{background:#f00;color:#fff;}
        
        .live-dot{display:inline-block;width:6px;height:6px;background:#0f0;border-radius:50%;animation:livePulse 1s infinite;margin-left:4px;}
        @keyframes livePulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
        
        @media(max-width:600px){.login-box{width:90%;padding:25px;}}
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <div class="logo">🌑</div>
        <h1>DARK KNIGHT</h1>
        <div class="sub">ø ASAØ // FINAL EDITION <span class="live-dot"></span> LIVE</div>
        
        <input type="password" id="ownerCode" placeholder="🔑 رمز المالك">
        <button onclick="ownerLogin()">👑 دخول المالك</button>
        <div class="error" id="ownerError">❌ رمز خاطئ</div>
        
        <div style="color:#333;margin:15px 0;">─── أو ───</div>
        
        <input type="text" id="visitorPhone" placeholder="📱 رقم هاتفك (سري)">
        <button class="orange" onclick="visitorRequest()">🚶 دخول كزائر</button>
        <div class="success" id="visitorSuccess"></div>
        <div class="error" id="visitorError"></div>
    </div>
</div>

<div id="mainScreen">
    <div class="header">
        <span class="brand">🌑 DARK KNIGHT <span class="live-dot"></span></span>
        <span class="user" id="headerUser"></span>
        <div class="btns">
            <button onclick="openVisitors()">📋 الزوار</button>
            <button onclick="openReports()">🚨 البلاغات</button>
            <button class="red" onclick="logout()">🚪 خروج</button>
        </div>
    </div>
    
    <div class="layout">
        <div class="post-box" id="publishBox" style="display:none;">
            <textarea id="postContent" placeholder="✍️ ماذا تريد أن تنشر؟"></textarea>
            <input type="file" id="postImage" accept="image/*" onchange="previewImage()">
            <img class="img-preview" id="imagePreview">
            <button onclick="publishPost()">📢 نشر</button>
        </div>
        
        <div id="postsContainer">
            <div style="text-align:center;color:#555;padding:30px;">📭 جاري التحميل...</div>
        </div>
    </div>
</div>

<div class="modal" id="visitorsModal">
    <div class="modal-content">
        <h3>📋 إدارة الزوار</h3>
        <div id="visitorsList"></div>
        <button onclick="closeModal('visitorsModal')">إغلاق</button>
    </div>
</div>

<div class="modal" id="reportsModal">
    <div class="modal-content">
        <h3>🚨 البلاغات</h3>
        <div id="reportsList"></div>
        <button onclick="closeModal('reportsModal')">إغلاق</button>
    </div>
</div>

<div class="modal" id="reportModal">
    <div class="modal-content">
        <h3>🚨 تقديم بلاغ</h3>
        <div id="reportTarget"></div>
        <button class="report-option" onclick="submitReport('فعل جنسي')">🔞 فعل جنسي</button>
        <button class="report-option" onclick="submitReport('سرقة')">💰 سرقة</button>
        <button class="report-option" onclick="submitReport('أفعال خبيثة')">💀 أفعال خبيثة</button>
        <button class="report-option" onclick="submitReport('مضايقة')">😠 مضايقة</button>
        <button class="report-option" onclick="submitReport('انتحال شخصية')">🎭 انتحال شخصية</button>
        <button class="report-option" onclick="submitReport('محتوى غير لائق')">⚠️ محتوى غير لائق</button>
        <button class="report-option" onclick="submitReport('تهديد')">🗡️ تهديد</button>
        <button class="report-option" onclick="submitReport('اختراق')">👨‍💻 اختراق</button>
        <button class="report-option" onclick="submitReport('غير ذلك')">📝 غير ذلك</button>
        <button class="red" onclick="closeModal('reportModal')">إلغاء</button>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, serverTimestamp, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDktNhUGoYbKqJPK4JJ8RCeF9KZ5HGhQvE",
    authDomain: "shadow-vault-chat.firebaseapp.com",
    databaseURL: "https://shadow-vault-chat-default-rtdb.firebaseio.com",
    projectId: "shadow-vault-chat",
    storageBucket: "shadow-vault-chat.appspot.com",
    messagingSenderId: "1085738429214",
    appId: "1:1085738429214:web:abc123def456"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const OWNER_CODE = '54379';
let currentUser = null;
let isOwner = false;
let reportTarget = null;
let visitorIPData = null;

// --- حماية ---
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'U') || (e
        .ctrlKey && e.key === 'S')) {
        e.preventDefault();
        return false;
    }
});

// --- IP ---
async function getIPInfo() {
    try { const r = await fetch('https://ipapi.co/json/'); return await r.json(); } catch (e) { return null; }
}

// --- دخول المالك ---
window.ownerLogin = async function() {
    const code = document.getElementById('ownerCode').value.trim();
    if (code === OWNER_CODE) {
        currentUser = '👑 المالك';
        isOwner = true;
        document.getElementById('ownerError').style.display = 'none';
        visitorIPData = await getIPInfo();
        showMainScreen();
    } else { document.getElementById('ownerError').style.display = 'block'; }
};

// --- دخول الزائر ---
window.visitorRequest = async function() {
    const phone = document.getElementById('visitorPhone').value.trim();
    if (!phone || phone.length < 5) {
        document.getElementById('visitorError').textContent = '❌ أدخل رقم هاتف صحيح';
        document.getElementById('visitorError').style.display = 'block';
        return;
    }

    visitorIPData = await getIPInfo();

    // التحقق من الحظر
    const banRef = ref(db, 'banned/' + phone.replace(/[.#$\[\]]/g, '_'));
    const banSnap = await new Promise(resolve => onValue(banRef, resolve, { onlyOnce: true }));
    if (banSnap.val()) {
        document.getElementById('visitorError').textContent = '🚫 تم حظرك من الموقع. لا يمكنك الدخول.';
        document.getElementById('visitorError').style.display = 'block';
        return;
    }

    // التحقق من الموافقة
    const appRef = ref(db, 'approved/' + phone.replace(/[.#$\[\]]/g, '_'));
    const appSnap = await new Promise(resolve => onValue(appRef, resolve, { onlyOnce: true }));

    if (appSnap.val()) {
        currentUser = '🚶 ' + phone.substring(0, 4) + '****';
        isOwner = false;
        document.getElementById('visitorError').style.display = 'none';
        document.getElementById('visitorSuccess').textContent = '✅ مرحباً بعودتك!';
        document.getElementById('visitorSuccess').style.display = 'block';
        setTimeout(() => showMainScreen(), 500);
        return;
    }

    // إرسال طلب للمالك
    const visitRef = ref(db, 'visitorRequests');
    const newReq = push(visitRef);
    await set(newReq, {
        phone: phone,
        time: new Date().toISOString(),
        device: navigator.userAgent.substring(0, 100),
        ip: visitorIPData ? visitorIPData.ip : 'غير معروف',
        country: visitorIPData ? visitorIPData.country_name : 'غير معروف',
        city: visitorIPData ? visitorIPData.city : 'غير معروف',
        status: 'pending'
    });

    document.getElementById('visitorError').style.display = 'none';
    document.getElementById('visitorSuccess').textContent = '✅ تم إرسال طلبك للمالك. انتظر القبول.';
    document.getElementById('visitorSuccess').style.display = 'block';
};

// --- الشاشة الرئيسية ---
function showMainScreen() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    document.getElementById('headerUser').textContent = currentUser;

    if (isOwner) {
        document.getElementById('publishBox').style.display = 'block';
        listenForVisitorRequests();
    }

    listenForPosts();
}

// --- استماع للطلبات ---
function listenForVisitorRequests() {
    const visitRef = ref(db, 'visitorRequests');
    onChildAdded(visitRef, async function(snapshot) {
        const req = snapshot.val();
        if (req.status === 'pending') {
            if (confirm('📱 زائر جديد:\n\nالرقم: ' + req.phone + '\nالدولة: ' + req.country + '\nالمدينة: ' +
                    req.city + '\n\nهل تقبله؟')) {
                const appRef = ref(db, 'approved/' + req.phone.replace(/[.#$\[\]]/g, '_'));
                await set(appRef, { phone: req.phone, device: req.device, country: req.country, city: req
                        .city, ip: req.ip, approvedAt: serverTimestamp() });
                await set(ref(db, 'visitorRequests/' + snapshot.key), { ...req, status: 'approved' });
                alert('✅ تم قبول الزائر');
            } else {
                await set(ref(db, 'visitorRequests/' + snapshot.key), { ...req, status: 'rejected' });
            }
        }
    });
}

// --- استماع للمنشورات ---
function listenForPosts() {
    const postsRef = ref(db, 'posts');
    onValue(postsRef, function(snapshot) {
        const data = snapshot.val();
        const container = document.getElementById('postsContainer');
        if (!data) {
            container.innerHTML =
                '<div style="text-align:center;color:#555;padding:30px;">📭 لا توجد منشورات...</div>';
            return;
        }
        const posts = Object.entries(data).map(([id, p]) => ({ id, ...p }));
        posts.sort((a, b) => b.timestamp - a.timestamp);

        container.innerHTML = posts.map(post => `
            <div class="post-card">
                <div class="post-author">
                    ${post.author}
                    ${post.authorPhone === 'OWNER' ? ' <span class="badge owner">مالك</span>' : ''}
                    ${isOwner && post.authorPhone !== 'OWNER' ? ' <span style="color:#fa0;font-size:9px;">📱 ' + post.authorPhone + '</span>' : ''}
                </div>
                <div class="post-time">${new Date(post.timestamp).toLocaleString('ar-SA')}</div>
                <div class="post-content">
                    ${post.content}
                    ${post.image ? '<br><img src="' + post.image + '" onclick="this.style.transform=this.style.transform===\'scale(2)\'?\'\':\'scale(2)\'" style="cursor:pointer;transition:0.3s;max-width:200px;">' : ''}
                </div>
                <div class="post-actions">
                    <button onclick="toggleComments('${post.id}')">💬 تعليق (${post.comments ? Object.keys(post.comments).length : 0})</button>
                    ${!isOwner ? '<button class="report-btn" onclick="openReport(\'' + post.id + '\',\'post\')">🚨 بلاغ</button>' : ''}
                    ${post.reports && Object.keys(post.reports).length > 0 && isOwner ? '<span style="color:#f00;font-size:9px;">🚨 ' + Object.keys(post.reports).length + ' بلاغ</span>' : ''}
                    ${isOwner ? '<button class="report-btn" onclick="deletePost(\'' + post.id + '\')">🗑️ حذف</button>' : ''}
                </div>
                <div class="comment-section" id="comments-${post.id}" style="display:none;">
                    ${post.comments ? Object.entries(post.comments).map(([cid, c]) => `
                        <div class="comment-item">
                            <span><span class="comment-author">${c.author}:</span> <span class="comment-text">${c.text}</span></span>
                            ${!isOwner ? '<button style="background:transparent;border:none;color:#600;cursor:pointer;font-size:8px;" onclick="openReport(\'' + post.id + '\',\'comment\',\'' + cid + '\')">🚨</button>' : ''}
                        </div>
                    `).join('') : ''}
                    <input type="text" placeholder="✍️ تعليق..." onkeydown="if(event.key==='Enter')addComment('${post.id}',this)">
                </div>
            </div>
        `).join('');
    });
}

// --- نشر ---
window.publishPost = async function() {
    const content = document.getElementById('postContent').value.trim();
    const imgPreview = document.getElementById('imagePreview');
    const imageData = imgPreview.src && imgPreview.style.display !== 'none' ? imgPreview.src : null;

    if (!content && !imageData) return;

    const postsRef = ref(db, 'posts');
    const newPost = push(postsRef);
    await set(newPost, {
        author: isOwner ? '👑 المالك' : currentUser,
        authorPhone: isOwner ? 'OWNER' : currentUser,
        content: content || '📷 صورة',
        image: imageData || '',
        timestamp: serverTimestamp(),
        comments: {},
        reports: {}
    });

    document.getElementById('postContent').value = '';
    imgPreview.src = '';
    imgPreview.style.display = 'none';
    document.getElementById('postImage').value = '';
};

window.previewImage = function() {
    const file = document.getElementById('postImage').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = document.getElementById('imagePreview');
        img.src = e.target.result;
        img.style.display = 'block';
    };
    reader.readAsDataURL(file);
};

// --- تعليقات ---
window.toggleComments = function(postId) {
    const sec = document.getElementById('comments-' + postId);
    sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
};

window.addComment = async function(postId, input) {
    const text = input.value.trim();
    if (!text) return;
    const commRef = ref(db, 'posts/' + postId + '/comments');
    const newComm = push(commRef);
    await set(newComm, {
        author: currentUser,
        text: text,
        timestamp: serverTimestamp()
    });
    input.value = '';
    document.getElementById('comments-' + postId).style.display = 'block';
};

window.deletePost = async function(postId) {
    if (!isOwner) return;
    if (!confirm('هل أنت متأكد من حذف هذا المنشور؟')) return;
    await remove(ref(db, 'posts/' + postId));
};

// --- بلاغات ---
window.openReport = function(targetId, type, commentId = null) {
    reportTarget = { targetId, type, commentId };
    document.getElementById('reportTarget').textContent = '🚨 بلاغ على: ' + (type === 'post' ? 'منشور' :
        'تعليق');
    document.getElementById('reportModal').classList.add('active');
};

window.submitReport = async function(reason) {
    if (!reportTarget) return;
    const reportRef = ref(db, 'reports');
    const newReport = push(reportRef);
    await set(newReport, {
        targetId: reportTarget.targetId,
        type: reportTarget.type,
        commentId: reportTarget.commentId || '',
        reason: reason,
        reporter: currentUser,
        timestamp: serverTimestamp()
    });

    if (reportTarget.type === 'post') {
        const postReportRef = ref(db, 'posts/' + reportTarget.targetId + '/reports');
        const pr = push(postReportRef);
        await set(pr, { reason: reason, reporter: currentUser, timestamp: serverTimestamp() });
    }

    document.getElementById('reportModal').classList.remove('active');
    alert('✅ تم إرسال البلاغ للمالك.');
    reportTarget = null;
};

// --- نافذة البلاغات ---
window.openReports = function() {
    const reportsRef = ref(db, 'reports');
    onValue(reportsRef, function(snapshot) {
        const data = snapshot.val();
        const list = document.getElementById('reportsList');
        if (!data) {
            list.innerHTML = '<div style="color:#888;text-align:center;">لا توجد بلاغات</div>';
        } else {
            list.innerHTML = Object.entries(data).map(([id, r]) => `
                <div class="visitor-row">
                    <span>🚨 ${r.reason} | من: ${r.reporter} | ${new Date(r.timestamp).toLocaleString('ar-SA')}</span>
                </div>
            `).join('');
        }
        document.getElementById('reportsModal').classList.add('active');
    }, { onlyOnce: true });
};

// --- نافذة الزوار ---
window.openVisitors = function() {
    if (!isOwner) return;
    const appRef = ref(db, 'approved');
    const banRef = ref(db, 'banned');

    Promise.all([
        new Promise(resolve => onValue(appRef, resolve, { onlyOnce: true })),
        new Promise(resolve => onValue(banRef, resolve, { onlyOnce: true }))
    ]).then(([appSnap, banSnap]) => {
        const approved = appSnap.val() || {};
        const banned = banSnap.val() || {};
        const list = document.getElementById('visitorsList');

        const allPhones = [...new Set([...Object.keys(approved), ...Object.keys(banned)])];
        if (allPhones.length === 0) {
            list.innerHTML = '<div style="color:#888;text-align:center;">لا يوجد زوار</div>';
        } else {
            list.innerHTML = allPhones.map(phone => {
                const v = approved[phone] || banned[phone] || {};
                const isBanned = !!banned[phone];
                return `
                    <div class="visitor-row">
                        <span>📱 ${v.phone || phone}</span>
                        <span style="color:#888;font-size:9px;">${v.country || '?'} - ${v.city || '?'}</span>
                        ${isBanned ? '<span class="badge banned">محظور</span>' : ''}
                        ${!isBanned ? '<button onclick="banVisitor(\'' + phone + '\')">🚫 حظر</button>' : '<button style="background:#0f0;color:#000;" onclick="unbanVisitor(\'' + phone + '\')">✅ فك</button>'}
                    </div>
                `;
            }).join('');
        }
        document.getElementById('visitorsModal').classList.add('active');
    });
};

window.banVisitor = async function(phone) {
    if (!confirm('🚫 حظر ' + phone + ' نهائياً؟')) return;
    const key = phone.replace(/[.#$\[\]]/g, '_');
    await set(ref(db, 'banned/' + key), { phone: phone, bannedAt: serverTimestamp() });
    await remove(ref(db, 'approved/' + key));
    alert('🚫 تم حظر ' + phone);
    openVisitors();
};

window.unbanVisitor = async function(phone) {
    const key = phone.replace(/[.#$\[\]]/g, '_');
    await remove(ref(db, 'banned/' + key));
    await set(ref(db, 'approved/' + key), { phone: phone, unbannedAt: serverTimestamp() });
    alert('✅ تم فك الحظر عن ' + phone);
    openVisitors();
};

window.closeModal = function(id) {
    document.getElementById(id).classList.remove('active');
};

window.logout = function() {
    currentUser = null;
    isOwner = false;
    visitorIPData = null;
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('ownerCode').value = '';
    document.getElementById('visitorPhone').value = '';
};
</script>
</body>
</html>
