<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ø ASAØ - قبو الظل</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --border: #1a1a1a;
            --text: #c0c0c0;
            --accent: #8b0000;
            --gold: #8b0000;
            --my-msg: #1a0000;
            --their-msg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* شاشة تسجيل الدخول */
        #loginScreen {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.3);
        }

        #loginScreen h1 {
            color: var(--accent);
            font-size: 28px;
            letter-spacing: 6px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        #loginScreen .subtitle {
            color: #555;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        #loginScreen input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-size: 16px;
            border-radius: 4px;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s;
        }

        #loginScreen input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
        }

        #loginScreen button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        #loginScreen button:hover {
            background: #a00000;
            box-shadow: 0 0 25px rgba(139, 0, 0, 0.5);
        }

        #loginError {
            color: #ff0000;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        /* شاشة المحادثة */
        #chatScreen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background: var(--bg);
        }

        #chatHeader {
            background: #000;
            border-bottom: 1px solid var(--accent);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chatHeader .room-name {
            color: var(--accent);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            letter-spacing: 4px;
        }

        #chatHeader .user-count {
            color: #555;
            font-size: 12px;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            word-break: break-word;
            animation: msgIn 0.3s ease;
            position: relative;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-mine {
            align-self: flex-end;
            background: var(--my-msg);
            border: 1px solid #330000;
            border-bottom-right-radius: 2px;
        }

        .message-theirs {
            align-self: flex-start;
            background: var(--their-msg);
            border: 1px solid #1a1a1a;
            border-bottom-left-radius: 2px;
        }

        .message-sender {
            font-size: 10px;
            color: var(--accent);
            margin-bottom: 4px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .message-text {
            font-size: 15px;
            color: #ccc;
            line-height: 1.5;
        }

        .message-text img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin: 5px 0;
        }

        .message-text .emoji-large {
            font-size: 40px;
        }

        .message-time {
            font-size: 9px;
            color: #444;
            margin-top: 4px;
            text-align: left;
        }

        .system-msg {
            text-align: center;
            color: #333;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 8px;
        }

        /* شريط الإدخال */
        #chatInputArea {
            background: #000;
            border-top: 1px solid #1a1a1a;
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #chatInputArea input[type="text"] {
            flex: 1;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #fff;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
        }

        #chatInputArea input[type="text"]:focus {
            border-color: var(--accent);
        }

        #chatInputArea button {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #chatInputArea button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        #fileInput {
            display: none;
        }

        /* الإيموجيات */
        #emojiPanel {
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background: #000;
            border-top: 1px solid #1a1a1a;
            max-height: 200px;
            overflow-y: auto;
            justify-content: center;
        }

        #emojiPanel.active {
            display: flex;
        }

        #emojiPanel span {
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
            animation: emojiBounce 0.5s infinite alternate;
        }

        #emojiPanel span:hover {
            transform: scale(1.4);
        }

        @keyframes emojiBounce {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-5px);
            }
        }

        /* صورة مكبرة */
        #imageModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #imageModal img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
        }

        /* التشفير */
        .secure-badge {
            color: #004400;
            font-size: 10px;
            letter-spacing: 2px;
            margin-left: 5px;
        }

        /* شريط التمرير */
        #chatMessages::-webkit-scrollbar {
            width: 4px;
        }
        #chatMessages::-webkit-scrollbar-track {
            background: #000;
        }
        #chatMessages::-webkit-scrollbar-thumb {
            background: #1a0000;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="loginScreen">
        <h1>ø ASAØ</h1>
        <div class="subtitle">SHADOW-VAULT</div>
        <input type="text" id="usernameInput" placeholder="أدخل اسمك" maxlength="20" autocomplete="off">
        <input type="password" id="codeInput" placeholder="أدخل رمز الدخول" maxlength="10" autocomplete="off">
        <button onclick="attemptLogin()">⚔️ دخول</button>
        <div id="loginError">❌ الرمز غير صحيح</div>
    </div>

    <!-- شاشة المحادثة -->
    <div id="chatScreen">
        <div id="chatHeader">
            <span class="room-name">ø ASAØ <span class="secure-badge">[ENCRYPTED]</span></span>
            <span class="user-count" id="userCount">👤 0</span>
        </div>

        <div id="chatMessages"></div>

        <div id="emojiPanel">
            <!-- إيموجيات متحركة -->
            <span onclick="insertEmoji('😈')">😈</span>
            <span onclick="insertEmoji('💀')">💀</span>
            <span onclick="insertEmoji('🐱‍👤')">🐱‍👤</span>
            <span onclick="insertEmoji('👁️')">👁️</span>
            <span onclick="insertEmoji('🔥')">🔥</span>
            <span onclick="insertEmoji('⚡')">⚡</span>
            <span onclick="insertEmoji('🩸')">🩸</span>
            <span onclick="insertEmoji('🧨')">🧨</span>
            <span onclick="insertEmoji('💣')">💣</span>
            <span onclick="insertEmoji('🗡️')">🗡️</span>
            <span onclick="insertEmoji('🖤')">🖤</span>
            <span onclick="insertEmoji('👻')">👻</span>
            <span onclick="insertEmoji('🎭')">🎭</span>
            <span onclick="insertEmoji('🦅')">🦅</span>
            <span onclick="insertEmoji('🐺')">🐺</span>
            <span onclick="insertEmoji('🕷️')">🕷️</span>
            <span onclick="insertEmoji('🦇')">🦇</span>
            <span onclick="insertEmoji('⛓️')">⛓️</span>
            <span onclick="insertEmoji('🪦')">🪦</span>
            <span onclick="insertEmoji('☠️')">☠️</span>
            <span onclick="insertEmoji('👹')">👹</span>
            <span onclick="insertEmoji('🤖')">🤖</span>
            <span onclick="insertEmoji('🎃')">🎃</span>
            <span onclick="insertEmoji('😱')">😱</span>
        </div>

        <div id="chatInputArea">
            <button onclick="toggleEmojiPanel()" title="إيموجيات">😀</button>
            <button onclick="document.getElementById('fileInput').click()" title="إرسال صورة">📷</button>
            <input type="file" id="fileInput" accept="image/*" onchange="sendImage()">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()" title="إرسال">▶</button>
        </div>
    </div>

    <!-- مكبر الصور -->
    <div id="imageModal" onclick="closeImageModal()">
        <img id="modalImage" src="" alt="صورة">
    </div>

    <script>
        // ============================================================
        // ø ASAØ | "قبو الظل" (SHADOW-VAULT)
        // غرفة محادثة مشفرة - رمز الدخول: 57348
        // ============================================================

        const ACCESS_CODE = '57348';
        let currentUser = '';
        let localMessages = [];

        // --- الدخول ---
        function attemptLogin() {
            const username = document.getElementById('usernameInput').value.trim();
            const code = document.getElementById('codeInput').value.trim();
            const errorEl = document.getElementById('loginError');

            if (!username) {
                errorEl.textContent = '❌ أدخل اسمك أولاً';
                errorEl.style.display = 'block';
                return;
            }
            if (!code) {
                errorEl.textContent = '❌ أدخل الرمز';
                errorEl.style.display = 'block';
                return;
            }
            if (code !== ACCESS_CODE) {
                errorEl.textContent = '❌ الرمز غير صحيح - تم تسجيل المحاولة';
                errorEl.style.display = 'block';
                document.getElementById('codeInput').value = '';
                document.getElementById('codeInput').style.borderColor = '#ff0000';
                setTimeout(() => { document.getElementById('codeInput').style.borderColor = '#333'; }, 1500);
                return;
            }

            currentUser = username;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';

            addSystemMessage('👤 ' + currentUser + ' دخل الغرفة');
            updateUserCount();
            document.getElementById('messageInput').focus();

            // تشفير بسيط للاسم
            const encryptedName = btoa(currentUser);
            console.log('🔒 اسم مشفر: ' + encryptedName);
        }

        // --- إرسال رسالة ---
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(currentUser, text, true);
            input.value = '';
            input.focus();
            updateUserCount();
        }

        // --- إرسال صورة ---
        function sendImage() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgSrc = e.target.result;
                const imgHtml = '<img src="' + imgSrc + '" onclick="openImageModal(\'' + imgSrc +
                    '\')" style="cursor:pointer;">';
                addMessage(currentUser, imgHtml, true);
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        }

        // --- إضافة رسالة ---
        function addMessage(sender, text, isMine) {
            const msgObj = {
                sender: sender,
                text: text,
                isMine: isMine,
                time: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' })
            };
            localMessages.push(msgObj);
            renderMessage(msgObj);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        // --- عرض رسالة ---
        function renderMessage(msgObj) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-bubble ' + (msgObj.isMine ? 'message-mine' : 'message-theirs');

            const senderSpan = document.createElement('div');
            senderSpan.className = 'message-sender';
            senderSpan.textContent = msgObj.isMine ? 'أنت' : msgObj.sender;

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.innerHTML = msgObj.text;

            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.textContent = msgObj.time;

            msgDiv.appendChild(senderSpan);
            msgDiv.appendChild(textDiv);
            msgDiv.appendChild(timeSpan);

            document.getElementById('chatMessages').appendChild(msgDiv);
        }

        // --- رسالة نظام ---
        function addSystemMessage(text) {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-msg';
            sysDiv.textContent = text;
            document.getElementById('chatMessages').appendChild(sysDiv);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        // --- إيموجيات ---
        function toggleEmojiPanel() {
            const panel = document.getElementById('emojiPanel');
            panel.classList.toggle('active');
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
        }

        // --- مكبر الصور ---
        function openImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // --- تحديث عدد المستخدمين ---
        function updateUserCount() {
            const uniqueUsers = [...new Set(localMessages.map(m => m.sender)), currentUser];
            document.getElementById('userCount').textContent = '👤 ' + uniqueUsers.length;
        }

        // --- منع الدخول غير المصرح ---
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
                attemptLogin();
            }
        });

        // --- تشفير محلي للرسائل ---
        function encryptMessage(text) {
            return btoa(encodeURIComponent(text));
        }

        function decryptMessage(encoded) {
            try {
                return decodeURIComponent(atob(encoded));
            } catch (e) {
                return '[رسالة مشفرة]';
            }
        }

        // --- حماية من F12 و DevTools ---
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });

        console.log('ø ASAØ SHADOW-VAULT // READY');
        console.log('ACCESS CODE: ' + btoa(ACCESS_CODE));
    </script>
</body>
</html>
