<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌑 DARK KNIGHT - ø ASAØ</title>
    <style>
        :root{--bg:#000a14;--panel:#001020;--accent:#1a73e8;--accent2:#ff6d00;--text:#c0c0c0;--gold:#ffaa00;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);font-family:'Segoe UI','Arial',sans-serif;color:var(--text);min-height:100vh;}
        
        #loginScreen{display:flex;justify-content:center;align-items:center;height:100vh;background:var(--bg);}
        .login-box{background:var(--panel);border:1px solid #1a3050;border-radius:16px;padding:40px;text-align:center;width:380px;box-shadow:0 0 60px rgba(26,115,232,0.2);}
        .login-box .logo{font-size:60px;margin-bottom:10px;}
        .login-box h1{color:#fff;font-size:24px;letter-spacing:4px;margin-bottom:5px;}
        .login-box .sub{color:#666;font-size:10px;letter-spacing:2px;margin-bottom:25px;}
        .login-box input, .login-box textarea{width:100%;padding:12px;margin:6px 0;background:#000;border:1px solid #1a3050;color:#fff;font-size:14px;border-radius:6px;text-align:center;outline:none;font-family:inherit;resize:none;}
        .login-box input:focus{border-color:var(--accent);box-shadow:0 0 15px rgba(26,115,232,0.3);}
        .login-box button{width:100%;padding:12px;margin-top:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:bold;cursor:pointer;letter-spacing:2px;}
        .login-box button:hover{background:#1a5fd4;}
        .login-box button.orange{background:var(--accent2);}
        .login-box button.orange:hover{background:#e05500;}
        .login-box .link{color:var(--accent);font-size:10px;cursor:pointer;margin-top:10px;display:inline-block;}
        .login-box .link:hover{text-decoration:underline;}
        .error{color:#f00;font-size:10px;margin-top:5px;display:none;}
        .success{color:#0f0;font-size:10px;margin-top:5px;display:none;}
        
        #mainScreen{display:none;}
        .header{background:#000;border-bottom:1px solid #1a3050;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
        .header .brand{color:var(--accent);font-size:18px;font-weight:bold;letter-spacing:3px;}
        .header .user{color:#888;font-size:11px;}
        .header button{background:var(--accent2);color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:10px;letter-spacing:1px;}
        
        .layout{max-width:700px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:15px;}
        
        .post-box{background:var(--panel);border:1px solid #1a3050;border-radius:12px;padding:20px;}
        .post-box textarea{width:100%;background:#000;border:1px solid #1a3050;color:#fff;padding:12px;border-radius:8px;font-size:14px;outline:none;font-family:inherit;resize:none;min-height:80px;}
        .post-box textarea:focus{border-color:var(--accent);}
        .post-box button{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:bold;margin-top:8px;letter-spacing:1px;}
        
        .post-card{background:var(--panel);border:1px solid #1a3050;border-radius:12px;padding:15px 20px;}
        .post-card .post-author{color:var(--accent);font-size:11px;font-weight:bold;letter-spacing:1px;}
        .post-card .post-time{color:#555;font-size:9px;}
        .post-card .post-content{color:#ddd;font-size:14px;margin:10px 0;line-height:1.6;}
        .post-card .post-actions{display:flex;gap:10px;margin-top:8px;}
        .post-card .post-actions button{background:transparent;border:1px solid #333;color:#888;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:10px;}
        .post-card .post-actions button:hover{background:#1a3050;color:#fff;}
        
        .comment-section{margin-top:10px;border-top:1px solid #1a3050;padding-top:10px;}
        .comment-section input{width:100%;background:#000;border:1px solid #1a3050;color:#fff;padding:8px;border-radius:20px;font-size:11px;outline:none;margin-top:5px;}
        .comment-section input:focus{border-color:var(--accent);}
        .comment-item{padding:4px 0;font-size:10px;}
        .comment-item .comment-author{color:var(--accent);font-size:9px;}
        .comment-item .comment-text{color:#aaa;}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:200;justify-content:center;align-items:center;}
        .modal.active{display:flex;}
        .modal-content{background:var(--panel);border:1px solid #1a3050;border-radius:12px;padding:25px;width:350px;text-align:center;}
        .modal-content h3{color:#fff;margin-bottom:15px;}
        .modal-content button{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;margin:4px;}
        
        .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:8px;letter-spacing:1px;}
        .badge.owner{background:var(--gold);color:#000;}
        .badge.visitor{background:var(--accent);color:#fff;}
        
        @media(max-width:600px){.login-box{width:90%;padding:25px;}}
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen">
    <div class="login-box" id="loginBox">
        <div class="logo">🌑</div>
        <h1>DARK KNIGHT</h1>
        <div class="sub">ø ASAØ // منصة اجتماعية خاصة</div>
        
        <!-- خيار المالك -->
        <div id="ownerLogin">
            <input type="password" id="ownerCode" placeholder="🔑 أدخل رمز المالك" maxlength="10">
            <button onclick="ownerLogin()">👑 دخول المالك</button>
            <div class="error" id="ownerError">❌ رمز خاطئ</div>
        </div>
        
        <div style="color:#333;margin:15px 0;">─── أو ───</div>
        
        <!-- خيار الزائر -->
        <div id="visitorSection">
            <input type="text" id="visitorPhone" placeholder="📱 أدخل رقم هاتفك" maxlength="20">
            <button class="orange" onclick="visitorRequest()">🚶 دخول كزائر</button>
            <div class="success" id="visitorSuccess">✅ تم إرسال طلبك للمالك</div>
            <div class="error" id="visitorError">❌ أدخل رقم هاتف صحيح</div>
        </div>
        
        <div class="link" onclick="showApprovedList()">📋 عرض الزوار المقبولين</div>
    </div>
</div>

<!-- الشاشة الرئيسية -->
<div id="mainScreen">
    <div class="header">
        <span class="brand">🌑 DARK KNIGHT</span>
        <span class="user" id="headerUser"></span>
        <button onclick="logout()">🚪 خروج</button>
    </div>
    
    <div class="layout">
        <!-- صندوق النشر (للمالك فقط) -->
        <div class="post-box" id="publishBox" style="display:none;">
            <textarea id="postContent" placeholder="✍️ ماذا تريد أن تنشر؟"></textarea>
            <button onclick="publishPost()">📢 نشر</button>
        </div>
        
        <!-- المنشورات -->
        <div id="postsContainer">
            <div style="text-align:center;color:#555;padding:30px;">📭 لا توجد منشورات بعد...</div>
        </div>
    </div>
</div>

<!-- نافذة الزوار -->
<div class="modal" id="visitorsModal">
    <div class="modal-content">
        <h3>📋 الزوار المقبولين</h3>
        <div id="visitorsList" style="max-height:300px;overflow-y:auto;text-align:right;font-size:10px;"></div>
        <button onclick="closeVisitors()">إغلاق</button>
    </div>
</div>

<script>
// ============================================================
// ø ASAØ | DARK KNIGHT | منصة اجتماعية خاصة
// ============================================================

const OWNER_CODE='54379';
let currentUser=null;
let isOwner=false;

// --- تخزين محلي ---
function getData(){return JSON.parse(localStorage.getItem('darkKnightData')||'{"posts":[],"visitors":[],"approvedVisitors":[]}');}
function saveData(d){localStorage.setItem('darkKnightData',JSON.stringify(d));}

// --- دخول المالك ---
function ownerLogin(){
    const code=document.getElementById('ownerCode').value.trim();
    if(code===OWNER_CODE){
        currentUser='👑 المالك';
        isOwner=true;
        document.getElementById('ownerError').style.display='none';
        showMainScreen();
    }else{
        document.getElementById('ownerError').style.display='block';
    }
}

// --- طلب زيارة ---
function visitorRequest(){
    const phone=document.getElementById('visitorPhone').value.trim();
    if(!phone||phone.length<5){
        document.getElementById('visitorError').style.display='block';
        return;
    }
    document.getElementById('visitorError').style.display='none';
    
    const data=getData();
    // تحقق مما إذا كان مقبولاً مسبقاً
    if(data.approvedVisitors.includes(phone)){
        currentUser='🚶 زائر ('+phone+')';
        isOwner=false;
        document.getElementById('visitorSuccess').style.display='block';
        setTimeout(()=>showMainScreen(),800);
        return;
    }
    // إضافة إلى قائمة الطلبات
    if(!data.visitors.includes(phone)){
        data.visitors.push(phone);
        saveData(data);
    }
    document.getElementById('visitorSuccess').textContent='✅ تم إرسال رقمك للمالك. انتظر القبول.';
    document.getElementById('visitorSuccess').style.display='block';
    document.getElementById('visitorError').style.display='none';
    
    // إظهار للمالك في المرة القادمة
    alert('📱 رقمك أرسل للمالك. سيتم قبولك قريباً.');
}

// --- إظهار الشاشة الرئيسية ---
function showMainScreen(){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainScreen').style.display='block';
    document.getElementById('headerUser').textContent=currentUser;
    
    if(isOwner){
        document.getElementById('publishBox').style.display='block';
    }
    
    loadPosts();
    
    // إذا كان المالك، أظهر طلبات الزوار
    if(isOwner){
        const data=getData();
        if(data.visitors.length>0){
            const pending=data.visitors.filter(v=>!data.approvedVisitors.includes(v));
            if(pending.length>0){
                if(confirm('📱 هناك '+pending.length+' زائر جديد ينتظر القبول:\n\n'+pending.join('\n')+'\n\nهل تريد قبولهم جميعاً؟')){
                    data.approvedVisitors=[...new Set([...data.approvedVisitors,...pending])];
                    data.visitors=[];
                    saveData(data);
                    alert('✅ تم قبول جميع الزوار!');
                }
            }
        }
    }
}

// --- نشر ---
function publishPost(){
    const content=document.getElementById('postContent').value.trim();
    if(!content)return;
    
    const data=getData();
    data.posts.unshift({
        id:Date.now(),
        author:'👑 المالك',
        content:content,
        time:new Date().toLocaleString('ar-SA'),
        comments:[]
    });
    saveData(data);
    document.getElementById('postContent').value='';
    loadPosts();
}

// --- تحميل المنشورات ---
function loadPosts(){
    const data=getData();
    const container=document.getElementById('postsContainer');
    
    if(data.posts.length===0){
        container.innerHTML='<div style="text-align:center;color:#555;padding:30px;">📭 لا توجد منشورات بعد...</div>';
        return;
    }
    
    container.innerHTML=data.posts.map(post=>`
        <div class="post-card">
            <div class="post-author">${post.author} <span class="badge owner">مالك</span></div>
            <div class="post-time">${post.time}</div>
            <div class="post-content">${post.content}</div>
            <div class="post-actions">
                <button onclick="toggleComments('${post.id}')">💬 تعليق (${post.comments.length})</button>
            </div>
            <div class="comment-section" id="comments-${post.id}" style="display:none;">
                ${post.comments.map(c=>`
                    <div class="comment-item">
                        <span class="comment-author">${c.author}:</span>
                        <span class="comment-text">${c.text}</span>
                    </div>
                `).join('')}
                <input type="text" placeholder="✍️ اكتب تعليقاً..." onkeydown="if(event.key==='Enter')addComment('${post.id}',this)">
            </div>
        </div>
    `).join('');
}

// --- تعليقات ---
function toggleComments(postId){
    const sec=document.getElementById('comments-'+postId);
    sec.style.display=sec.style.display==='none'?'block':'none';
}

function addComment(postId,input){
    const text=input.value.trim();
    if(!text)return;
    
    const data=getData();
    const post=data.posts.find(p=>p.id==parseInt(postId));
    if(post){
        post.comments.push({author:currentUser,text:text,time:new Date().toLocaleString('ar-SA')});
        saveData(data);
        input.value='';
        loadPosts();
        document.getElementById('comments-'+postId).style.display='block';
    }
}

// --- الزوار ---
function showApprovedList(){
    const data=getData();
    document.getElementById('visitorsList').innerHTML=data.approvedVisitors.length>0
        ?data.approvedVisitors.map(v=>'📱 '+v).join('<br>')
        :'لا يوجد زوار مقبولون';
    document.getElementById('visitorsModal').classList.add('active');
}

function closeVisitors(){
    document.getElementById('visitorsModal').classList.remove('active');
}

// --- خروج ---
function logout(){
    currentUser=null;
    isOwner=false;
    document.getElementById('mainScreen').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('ownerCode').value='';
    document.getElementById('visitorPhone').value='';
    document.getElementById('ownerError').style.display='none';
    document.getElementById('visitorSuccess').style.display='none';
    document.getElementById('visitorError').style.display='none';
}
</script>
</body>
</html>
